name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, attest, and publish.
        required: true
        type: string
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const tagName = process.env.TAG_NAME;
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const packageLock = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          const versions = JSON.parse(fs.readFileSync("versions.json", "utf8"));

          if (!/^\d+\.\d+\.\d+$/.test(tagName)) {
            throw new Error(`Release tags must be bare semver, received "${tagName}".`);
          }

          if (manifest.version !== tagName) {
            throw new Error(
              `Tag "${tagName}" must match manifest.json version "${manifest.version}".`,
            );
          }

          if (packageJson.version !== manifest.version) {
            throw new Error(
              `package.json version "${packageJson.version}" must match manifest.json version "${manifest.version}".`,
            );
          }

          if (packageLock.version !== manifest.version) {
            throw new Error(
              `package-lock.json version "${packageLock.version}" must match manifest.json version "${manifest.version}".`,
            );
          }

          const rootPackage = packageLock.packages?.[""];
          if (rootPackage?.version !== manifest.version) {
            throw new Error(
              `package-lock.json root package version "${rootPackage?.version}" must match manifest.json version "${manifest.version}".`,
            );
          }

          if (versions[manifest.version] !== manifest.minAppVersion) {
            throw new Error(
              `versions.json must map ${manifest.version} to minAppVersion ${manifest.minAppVersion}.`,
            );
          }
          NODE

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build release assets
        run: npm run build

      - name: Verify release assets
        run: test -s main.js && test -s manifest.json && test -s styles.css

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              main.js manifest.json styles.css \
              --clobber
          else
            gh release create "$TAG_NAME" \
              main.js manifest.json styles.css \
              --verify-tag \
              --title "$TAG_NAME" \
              --generate-notes
          fi
